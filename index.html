<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>260311_Muqarnas</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="controls">
        <h1>Recursive Muqarnas Generator</h1>
        <p class="subtitle">Three-axis recursive growth (orthogonal, diagonal, secondary) with 22.5 deg branch clock and collision-aware convergence.</p>

        <div class="control-grid">
          <label>
            Dome Scope
            <select id="scope" disabled>
              <option value="full" selected>Full Dome (360 deg)</option>
            </select>
          </label>

          <label>
            Layers
            <input id="layers" type="number" min="1" max="120" step="1" />
          </label>

          <label>
            Layer Height Scale
            <input id="layerHeight" type="number" min="0" max="5" step="0.05" />
          </label>

          <label>
            Height Pattern
            <input id="heightPattern" type="text" placeholder="1,1,1" />
          </label>

          <label>
            Global Ratio Scale
            <input id="ratioScale" type="number" min="0.05" max="10" step="0.05" />
          </label>

          <label>
            Collision Epsilon
            <input id="collisionEpsilon" type="number" min="0.005" max="1" step="0.005" />
          </label>

          <label>
            Orthogonal Rule
            <input id="ruleOrthogonal" type="text" />
          </label>

          <label>
            Diagonal Rule
            <input id="ruleDiagonal" type="text" />
          </label>

          <label>
            Secondary Rule
            <input id="ruleSecondary" type="text" />
          </label>

          <label>
            Connection Type
            <select id="connectionType">
              <option value="convergent">Convergent</option>
              <option value="divergent">Divergent</option>
            </select>
          </label>

          <h3 class="group-title">Graphics</h3>

          <label>
            Tile Opacity
            <input id="tileOpacity" type="number" min="0.05" max="1" step="0.05" />
          </label>

          <label>
            Tile Edge Weight
            <input id="tileEdgeWidth" type="number" min="0.2" max="6" step="0.1" />
          </label>

          <label>
            Layer Line Weight
            <div class="inline-row">
              <input id="profileWidth" type="range" min="0.2" max="8" step="0.1" />
              <output id="profileWidthValue" for="profileWidth"></output>
            </div>
          </label>

          <label>
            Axis Line Weight
            <div class="inline-row">
              <input id="axisWidth" type="range" min="0.2" max="6" step="0.1" />
              <output id="axisWidthValue" for="axisWidth"></output>
            </div>
          </label>

          <label>
            Point Marker Size
            <input id="pointSize" type="number" min="0.4" max="10" step="0.1" />
          </label>

          <label>
            Annotation Size
            <input id="annotationSize" type="number" min="7" max="24" step="1" />
          </label>

          <label class="inline-check">
            <input id="showTriangles" type="checkbox" />
            <span>Show Triangles</span>
          </label>

          <label class="inline-check">
            <input id="showProfiles" type="checkbox" checked />
            <span>Show Layer Profiles</span>
          </label>

          <label class="inline-check">
            <input id="showPointMarkers" type="checkbox" checked />
            <span>Show Point Markers</span>
          </label>

          <label class="inline-check">
            <input id="showAnnotations" type="checkbox" />
            <span>Show Point Labels</span>
          </label>

          <label class="inline-check">
            <input id="showGrowthArrows" type="checkbox" checked />
            <span>Show Growth Arrows</span>
          </label>

          <label class="inline-check">
            <input id="showGrowthValues" type="checkbox" />
            <span>Show Growth Values</span>
          </label>

          <button id="resetView" type="button">Reset 3D Camera</button>
        </div>
      </aside>

      <main class="viewer-shell">
        <section class="panel">
          <header>
            <h2>Plan View</h2>
            <p>Recursive plan propagation and tile topology.</p>
          </header>
          <canvas id="planCanvas"></canvas>
        </section>

        <section class="panel">
          <header>
            <h2>3D Muqarnas</h2>
            <p>Layered recursive surfaces with convergent/divergent tiling.</p>
          </header>
          <div id="threeRoot"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./src/main.js?v=20260324f"></script>
  </body>
</html>
